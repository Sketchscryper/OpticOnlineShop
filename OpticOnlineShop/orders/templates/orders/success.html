{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow text-center">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Заказ успешно оформлен!</h3>
                </div>
                <div class="card-body">
                    <h4 class="mb-4">Спасибо за покупку!</h4>
                    <p>Номер вашего заказа: <strong>№{{ order.id }}</strong></p>
                    <p>Наш менеджер свяжется с вами для подтверждения заказа.</p>
                    <div class="mt-4">
                        <a href="{% url 'users:profile' %}" class="btn btn-primary">Мои заказы</a>
                        <a href="{% url 'catalog:product_list' %}" class="btn btn-secondary">Продолжить покупки</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
