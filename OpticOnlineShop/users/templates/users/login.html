{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="modern-form fade-in-up">
            <div class="text-center mb-4">
                <i class="fas fa-sign-in-alt fa-3x" style="color: #667eea;"></i>
                <h2 class="mt-2" style="color: var(--text-primary);">Добро пожаловать!</h2>
                <p style="color: var(--text-secondary);">Войдите в свой аккаунт</p>
            </div>
            
            {% if form.errors %}
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-triangle"></i> Неверное имя пользователя или пароль.
                </div>
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" style="color: var(--text-primary);">
                        <i class="fas fa-user"></i> Имя пользователя
                    </label>
                    <input type="text" name="username" class="form-control form-control-modern" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="color: var(--text-primary);">
                        <i class="fas fa-lock"></i> Пароль
                    </label>
                    <input type="password" name="password" class="form-control form-control-modern" required>
                </div>
                <button type="submit" class="btn-modern w-100">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </button>
            </form>
            <div class="text-center mt-4">
                <p style="color: var(--text-primary);">
                    Нет аккаунта? 
                    <a href="{% url 'users:register' %}" style="color: #667eea; font-weight: 600;">
                        <i class="fas fa-user-plus"></i> Зарегистрируйтесь
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>

<style>
    .modern-form {
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
    }
    
    .form-label {
        color: var(--text-primary) !important;
    }
    
    .text-center p {
        color: var(--text-primary) !important;
    }
    
    [data-theme="dark"] .text-center p {
        color: #e0e0e0 !important;
    }
    
    [data-theme="dark"] a {
        color: #a8c0ff !important;
    }
    
    [data-theme="dark"] a:hover {
        color: #c7e9fb !important;
    }
</style>
{% endblock %}
