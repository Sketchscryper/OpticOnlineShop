{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-edit"></i> Редактирование профиля</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label"><i class="fas fa-user"></i> Имя</label>
                                <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label"><i class="fas fa-user"></i> Фамилия</label>
                                <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-phone"></i> Телефон</label>
                            {{ form.phone }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-map-marker-alt"></i> Адрес</label>
                            {{ form.address }}
                        </div>
                        <button type="submit" class="btn-modern">
                            <i class="fas fa-save"></i> Сохранить изменения
                        </button>
                        <a href="{% url 'users:profile' %}" class="btn-outline-modern ms-2">
                            <i class="fas fa-times"></i> Отмена
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Стили для формы редактирования */
    .card {
        background-color: var(--card-bg);
        border-color: var(--border-color);
    }
    
    .card-header {
        background-color: var(--bg-secondary);
        border-bottom-color: var(--border-color);
    }
    
    .card-body {
        background-color: var(--card-bg);
    }
    
    .form-label {
        color: var(--text-primary);
    }
    
    .form-control {
        background-color: var(--input-bg) !important;
        color: var(--input-text) !important;
        border-color: var(--input-border) !important;
    }
    
    .form-control:focus {
        border-color: #667eea !important;
        box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2) !important;
    }
    
    textarea.form-control {
        background-color: var(--input-bg) !important;
        color: var(--input-text) !important;
    }
</style>
{% endblock %}
